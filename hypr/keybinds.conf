# ======= #
# Hyprctl #
# ======= #

bind = SUPER, r, exec, hyprctl reload


# ======= #
# Windows #
# ======= #

bind = ALT, Return, exec, $terminal
bind = CTRL, Return, killactive,
bind = SUPER, Delete, exit,

bind = SUPER, v, togglefloating,
bind = SUPER, f, fullscreenstate, 1
bind = ALT, c, centerwindow


# =============== #
# Launch Programs #
# =============== #

bind = ALT, p, exec, rofi -show drun -run-shell-command
#   wmenu
# bind = ALT, p, exec, wmenu-run -N 191726b0 -n e0def4 -f "Monofur 18"
#   waybar: toggle
bind = SUPER, b, exec, pkill waybar
bind = SUPER, b, exec, hyprctl dispatch exec waybar
bind = ALT, space, exec, pkill -SIGUSR1 waybar 

#bind = $mod4, E, exec, $fileManager
#bind = $mod4, P, pseudo, # dwindle
#bind = $mod4, J, togglesplit, # dwindle


# ====== #
# swaync #
# ====== #

bind = alt, n, submap, notifications
submap = notifications
bind = , s, exec, notify-send "Test Notification"
bind = , s, submap, reset

bind = , r, exec, notify-send "swaync-client:" "$(swaync-client --reload-config --reload-css)"
bind = , r, submap, reset

bind = , q, exec, swaync-client --hide-all
bind = , q, submap, reset
bind = , w, exec, swaync-client --hide-latest
bind = , w, submap, reset

bind = , escape, submap, reset
submap = reset


# ========== #
# Background #
# ========== #

bind = SUPER, w, exec, killall hyprpaper; hyprpaper


#=========#
# WINDOWS #
#=========#

bind = SUPER, l, resizeactive, 128 0
bind = SUPER, h, resizeactive, -128 0
bind = SUPER, k, resizeactive, 0 -10
bind = SUPER, j, resizeactive, 0 10

#   Focus window
bind = ALT, h, movefocus, l
bind = ALT, j, movefocus, d
bind = ALT, k, movefocus, u
bind = ALT, l, movefocus, r

#   Shift window position
bind = ALT SHIFT, h, movewindow, l
bind = ALT SHIFT, j, movewindow, d
bind = ALT SHIFT, k, movewindow, u
bind = ALT SHIFT, l, movewindow, r

# bind = ALT, k, layoutmsg, swapsplit


#============#
# WORKSPACES #
#============#

#   Focus workspace {N}
bind = ALT, 1, workspace, 1
bind = ALT, 2, workspace, 2
bind = ALT, 3, workspace, 3
bind = ALT, 4, workspace, 4
bind = ALT, 5, workspace, 5
bind = ALT, 6, workspace, 6
bind = ALT, 7, workspace, 7
bind = ALT, 8, workspace, 8
bind = ALT, 9, workspace, 9
bind = ALT, 0, workspace, 10

#   Move active window to workspace {N}
bind = ALT SHIFT, 1, movetoworkspace, 1
bind = ALT SHIFT, 2, movetoworkspace, 2
bind = ALT SHIFT, 3, movetoworkspace, 3
bind = ALT SHIFT, 4, movetoworkspace, 4
bind = ALT SHIFT, 5, movetoworkspace, 5
bind = ALT SHIFT, 6, movetoworkspace, 6
bind = ALT SHIFT, 7, movetoworkspace, 7
bind = ALT SHIFT, 8, movetoworkspace, 8
bind = ALT SHIFT, 9, movetoworkspace, 9
bind = ALT SHIFT, 0, movetoworkspace, 10

#   Scroll through existing workspaces
# bind = $mod1, mouse_down, workspace, e+1
# bind = $mod1, mouse_up, workspace, e-1


# Screenshot
# bind = ALT, s, exec, grim -g "$(slurp -d -w 1)" - | wl-copy -t image/png
bind = SUPER, s, exec, grim -g "$(slurp -d -w 1)" - | wl-copy -t image/png
# bind = ALT Shift, s, exec, grim -g "$(slurp -d -w 1)" /home/autumn/Downloads/screenshot.png
bind = SUPER Shift, s, exec, grim -g "$(slurp -d -w 1)" /home/autumn/Downloads/screenshot.png
