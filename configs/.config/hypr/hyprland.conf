#========#
# LAUNCH #
#========#

$terminal = foot
$terminal = ghostty


bind = SUPER, r, exec, hyprctl reload

#   wmenu
# bind = ALT, p, exec, wmenu-run -N 191726b0 -n e0def4 -f "Monofur 18"
bind = ALT, p, exec, rofi -show drun
#bind
#   waybar: toggle
bind = SUPER, b, exec, pkill waybar
bind = SUPER, b, exec, hyprctl dispatch exec waybar
bind = ALT, space, exec, pkill -SIGUSR1 waybar 


source = ~/.config/hypr/background.conf
source = ~/.config/hypr/keybinds.conf
source = ~/.config/hypr/appearance.conf


#======#
# INIT #
#======#

exec-once = gentoo-pipewire-launcher

exec-once = hyprpaper
exec-once = waybar
#exec-once = firefox-bin
#exec-once = discord


#========#
# LAYOUT #
#========#
general {
	#gaps_in = 4
	#gaps_out = 8 
	gaps_in = 0
	gaps_out = 0

	border_size = 1

	col.active_border = rgb(3e8fb0)
	#col.inactive_border = rgba(59595988)
	col.inactive_border = rgba(232136e6)

	# Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
	allow_tearing = false

	layout = dwindle
}

dwindle {
	pseudotile = true
	preserve_split = true
	force_split = 2
}

master {
	new_status = master
	new_on_active = after
}


#========================#
# WINDOWS AND WORKSPACES #
#========================#

# Example windowrule
# windowrule = float,class:^(foot)$,title:^(foot)$

# Ignore maximize requests from apps. You'll probably like this.
windowrule = suppressevent maximize, class:.*

# Fix some dragging issues with XWayland
windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0
